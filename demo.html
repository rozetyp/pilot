<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pilot — How it works</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #e0e0e0; font-family: -apple-system, system-ui, 'SF Mono', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

  .scene { width: 900px; height: 520px; position: relative; }

  /* Terminal */
  .terminal { position: absolute; left: 0; top: 0; width: 430px; height: 520px; background: #1a1a1a; border-radius: 12px; border: 1px solid #333; overflow: hidden; }
  .terminal-bar { height: 32px; background: #252525; display: flex; align-items: center; padding: 0 12px; gap: 6px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #ffbd2e; }
  .dot-g { background: #28c840; }
  .terminal-title { color: #666; font-size: 11px; margin-left: 8px; }
  .terminal-body { padding: 14px; font-size: 13px; line-height: 1.7; }
  .line { opacity: 0; white-space: pre; }
  .line.visible { opacity: 1; }
  .prompt { color: #888; }
  .cmd { color: #fff; }
  .info { color: #5c7cfa; }
  .warn { color: #f0c040; }
  .success { color: #28a745; }
  .url { color: #5cf; text-decoration: underline; }
  .dim { color: #555; }
  .cursor { display: inline-block; width: 7px; height: 14px; background: #888; animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 1px; }
  @keyframes blink { 50% { opacity: 0; } }

  /* Browser */
  .browser { position: absolute; right: 0; top: 0; width: 430px; height: 520px; background: #1a1a1a; border-radius: 12px; border: 1px solid #333; overflow: hidden; opacity: 0; transform: translateY(10px); transition: all 0.5s; }
  .browser.visible { opacity: 1; transform: translateY(0); }
  .browser-bar { height: 32px; background: #252525; display: flex; align-items: center; padding: 0 12px; gap: 6px; }
  .browser-url { flex: 1; background: #1a1a1a; border-radius: 4px; padding: 4px 10px; color: #888; font-size: 11px; margin-left: 8px; }
  .browser-body { position: relative; height: 488px; background: #111; }

  /* Pilot rescue page mock */
  .pilot-page { position: absolute; inset: 0; display: flex; flex-direction: column; }
  .pilot-bar { padding: 10px 14px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
  .pilot-bar-left { display: flex; align-items: center; gap: 8px; }
  .pilot-dot { width: 7px; height: 7px; border-radius: 50%; background: #4f4; }
  .pilot-title { font-size: 13px; font-weight: 600; color: #fff; }
  .pilot-context { font-size: 11px; color: #f0c040; }
  .pilot-timer { font-size: 11px; color: #555; }
  .pilot-screen { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .pilot-controls { padding: 8px 14px; border-top: 1px solid #222; display: flex; gap: 6px; align-items: center; }
  .pilot-input { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 5px 8px; color: #fff; font-size: 11px; flex: 1; }
  .pilot-btn { padding: 5px 12px; border-radius: 4px; border: none; font-weight: 600; font-size: 11px; cursor: default; }
  .pilot-btn-send { background: #222; color: #888; }
  .pilot-btn-done { background: #28a745; color: #fff; }

  /* Mock website inside pilot screen */
  .mock-site { width: 90%; height: 85%; background: #fff; border-radius: 6px; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
  .mock-logo { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }
  .mock-captcha { width: 220px; padding: 12px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .mock-checkbox { width: 20px; height: 20px; border: 2px solid #c0c0c0; border-radius: 3px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
  .mock-checkbox.checked { background: #28a745; border-color: #28a745; }
  .mock-checkbox-text { font-size: 12px; color: #555; }
  .mock-hcaptcha { font-size: 10px; color: #0074bf; font-weight: 600; }
  .mock-message { font-size: 11px; color: #888; margin-top: 8px; }

  /* Click animation */
  .click-ring { position: absolute; width: 30px; height: 30px; border: 2px solid #5cf; border-radius: 50%; opacity: 0; transform: scale(0); pointer-events: none; }
  .click-ring.animate { animation: clickPulse 0.6s ease-out; }
  @keyframes clickPulse { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

  /* Done screen */
  .done-overlay { position: absolute; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; opacity: 0; transition: opacity 0.5s; pointer-events: none; }
  .done-overlay.visible { opacity: 1; }
  .done-check { font-size: 40px; color: #28a745; }
  .done-text { font-size: 16px; color: #fff; }
  .done-sub { font-size: 11px; color: #666; }

  /* Arrow between terminal and browser */
  .arrow { position: absolute; left: 435px; top: 240px; width: 30px; text-align: center; color: #444; font-size: 20px; opacity: 0; transition: opacity 0.3s; }
  .arrow.visible { opacity: 1; }

  /* Replay */
  .replay { position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); color: #555; font-size: 12px; cursor: pointer; opacity: 0; transition: opacity 0.3s; }
  .replay.visible { opacity: 1; }
  .replay:hover { color: #888; }
</style>
</head>
<body>
<div class="scene" id="scene">
  <!-- Terminal -->
  <div class="terminal">
    <div class="terminal-bar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <span class="terminal-title">Terminal</span>
    </div>
    <div class="terminal-body" id="term"></div>
  </div>

  <!-- Arrow -->
  <div class="arrow" id="arrow">→</div>

  <!-- Browser -->
  <div class="browser" id="browser">
    <div class="browser-bar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <span class="browser-url" id="browserUrl">pilot / rescue</span>
    </div>
    <div class="browser-body">
      <div class="pilot-page">
        <div class="pilot-bar">
          <div class="pilot-bar-left">
            <div class="pilot-dot" id="pilotDot"></div>
            <span class="pilot-title">Pilot</span>
            <span class="pilot-context" id="pilotContext"></span>
          </div>
          <span class="pilot-timer" id="pilotTimer">0:00</span>
        </div>
        <div class="pilot-screen" id="pilotScreen">
          <div class="mock-site">
            <div class="mock-logo">htsapi.dev</div>
            <div style="font-size:11px;color:#888">Describe a product. Get the duty rate.</div>
            <div class="mock-captcha">
              <div class="mock-checkbox" id="mockCheckbox"></div>
              <div>
                <div class="mock-checkbox-text">I am human</div>
                <div class="mock-hcaptcha">hCaptcha</div>
              </div>
            </div>
            <div class="mock-message" id="mockMessage">Please complete the captcha first.</div>
          </div>
          <div class="click-ring" id="clickRing"></div>
        </div>
        <div class="pilot-controls">
          <input class="pilot-input" placeholder="Type text..." disabled>
          <button class="pilot-btn pilot-btn-send">Send</button>
          <button class="pilot-btn pilot-btn-done" id="doneBtn" style="margin-left:auto">Done</button>
        </div>
      </div>
      <div class="done-overlay" id="doneOverlay">
        <div class="done-check">&#10003;</div>
        <div class="done-text">Solved</div>
        <div class="done-sub" id="doneSub">6s — agent is continuing</div>
      </div>
    </div>
  </div>

  <div class="replay" id="replay" onclick="runDemo()">&#x21bb; Replay</div>
</div>

<script>
const term = document.getElementById('term');
let lineIndex = 0;

const script = [
  // [delay, type, content]
  [0,     'prompt', '$ node agent.js'],
  [600,   'info',   '  Agent: navigating to htsapi.dev...'],
  [800,   'info',   '  Agent: clicking Classify...'],
  [1000,  'warn',   '  Agent: hCaptcha detected!'],
  [400,   'info',   ''],
  [200,   'info',   '  Pilot: agent needs help — "Solve the hCaptcha"'],
  [100,   'url',    '  http://localhost:3001/pilot/abc123...'],
  [200,   'info',   ''],
  [100,   'dim',    '  Waiting for human...'],
  // --- human acts in browser ---
  [2500,  'action', 'show-browser'],
  [800,   'action', 'show-context'],
  [1200,  'action', 'click-captcha'],
  [1500,  'action', 'captcha-solved'],
  [1200,  'action', 'click-done'],
  [800,   'action', 'show-done'],
  // --- back to terminal ---
  [1200,  'success', '  Human solved it!'],
  [400,   'info',    '  Agent: continuing...'],
  [600,   'success', '  Agent: task complete.'],
  [400,   'prompt',  '$ '],
  [500,   'action',  'show-replay'],
];

let timer = null;
let timerStart = 0;

function clearAll() {
  term.innerHTML = '';
  lineIndex = 0;
  document.getElementById('browser').classList.remove('visible');
  document.getElementById('arrow').classList.remove('visible');
  document.getElementById('pilotContext').textContent = '';
  document.getElementById('mockCheckbox').classList.remove('checked');
  document.getElementById('mockCheckbox').innerHTML = '';
  document.getElementById('mockMessage').textContent = 'Please complete the captcha first.';
  document.getElementById('mockMessage').style.color = '#888';
  document.getElementById('doneOverlay').classList.remove('visible');
  document.getElementById('doneBtn').style.background = '#28a745';
  document.getElementById('pilotTimer').textContent = '0:00';
  document.getElementById('replay').classList.remove('visible');
  if (timer) clearInterval(timer);
}

function addLine(type, content) {
  const el = document.createElement('div');
  el.className = 'line';

  if (type === 'prompt') {
    el.innerHTML = `<span class="prompt">$ </span><span class="cmd">${content.replace('$ ', '')}</span><span class="cursor"></span>`;
  } else {
    el.className = `line ${type}`;
    el.textContent = content;
  }

  term.appendChild(el);
  requestAnimationFrame(() => el.classList.add('visible'));

  // Remove cursor from previous prompt
  const cursors = term.querySelectorAll('.cursor');
  if (cursors.length > 1) cursors[cursors.length - 2].remove();

  // Scroll
  term.scrollTop = term.scrollHeight;
}

function showClick(x, y) {
  const ring = document.getElementById('clickRing');
  const screen = document.getElementById('pilotScreen');
  const rect = screen.getBoundingClientRect();
  ring.style.left = (x - 15) + 'px';
  ring.style.top = (y - 15) + 'px';
  ring.classList.remove('animate');
  void ring.offsetWidth;
  ring.classList.add('animate');
}

function startTimer() {
  timerStart = Date.now();
  timer = setInterval(() => {
    const s = Math.floor((Date.now() - timerStart) / 1000);
    document.getElementById('pilotTimer').textContent = Math.floor(s/60) + ':' + String(s%60).padStart(2, '0');
  }, 1000);
}

function doAction(name) {
  switch (name) {
    case 'show-browser':
      document.getElementById('browser').classList.add('visible');
      document.getElementById('arrow').classList.add('visible');
      startTimer();
      break;
    case 'show-context':
      document.getElementById('pilotContext').textContent = 'Solve the hCaptcha';
      break;
    case 'click-captcha':
      showClick(145, 195);
      break;
    case 'captcha-solved':
      const cb = document.getElementById('mockCheckbox');
      cb.classList.add('checked');
      cb.innerHTML = '<span style="color:#fff;font-size:14px">&#10003;</span>';
      document.getElementById('mockMessage').textContent = 'Verified!';
      document.getElementById('mockMessage').style.color = '#28a745';
      break;
    case 'click-done':
      document.getElementById('doneBtn').style.background = '#1e7a35';
      setTimeout(() => document.getElementById('doneBtn').style.background = '#28a745', 150);
      break;
    case 'show-done':
      if (timer) clearInterval(timer);
      const elapsed = Math.floor((Date.now() - timerStart) / 1000);
      document.getElementById('doneSub').textContent = elapsed + 's — agent is continuing';
      document.getElementById('doneOverlay').classList.add('visible');
      break;
    case 'show-replay':
      document.getElementById('replay').classList.add('visible');
      break;
  }
}

function runDemo() {
  clearAll();
  let delay = 0;
  for (const [d, type, content] of script) {
    delay += d;
    setTimeout(() => {
      if (type === 'action') {
        doAction(content);
      } else {
        addLine(type, content);
      }
    }, delay);
  }
}

// Auto-start
setTimeout(runDemo, 500);
</script>
</body>
</html>
